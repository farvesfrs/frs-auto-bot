services:
  - type: web
    name: frs-auto-bot
    runtime: python
    rootDir: artifacts/frs-bot
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120 main:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
    autoDeploy: true
